<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="robots" content="noindex, nofollow" />
    <title>Team access · Breath of Innovation</title>
    <link rel="icon" href="/assets/favicon.svg" type="image/svg+xml" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Sora:wght@600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/css/site.css" />
    <style>
      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        padding: 24px;
        background:
          radial-gradient(ellipse 80% 60% at 20% 0%, rgba(0, 143, 211, 0.12), transparent),
          radial-gradient(ellipse 60% 50% at 90% 100%, rgba(95, 184, 50, 0.08), transparent),
          linear-gradient(160deg, #060d18 0%, #0d2840 45%, #060d18 100%);
      }
      .gate-shell { width: min(440px, 100%); }
      .gate-back {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        margin-bottom: 16px;
        font-size: 0.82rem;
        font-weight: 600;
        color: rgba(255, 255, 255, 0.65);
        text-decoration: none;
      }
      .gate-back:hover { color: #fff; }
      .gate-panel {
        padding: 36px 32px 32px;
        border-radius: 22px;
        background: rgba(255, 255, 255, 0.98);
        box-shadow: 0 28px 72px rgba(0, 0, 0, 0.32);
      }
      .gate-mark {
        width: 44px;
        height: 44px;
        display: grid;
        place-items: center;
        border-radius: 12px;
        background: linear-gradient(135deg, #0a1628, #008fd3);
        color: #fff;
        font-family: "Sora", sans-serif;
        font-weight: 800;
        font-size: 0.8rem;
        margin-bottom: 18px;
      }
      .gate-panel h1 {
        margin: 0 0 8px;
        font-family: "Sora", sans-serif;
        font-size: 1.45rem;
        font-weight: 800;
        letter-spacing: -0.03em;
        color: #0a1628;
      }
      .gate-sub {
        margin: 0 0 22px;
        font-size: 0.88rem;
        line-height: 1.55;
        color: #5c6678;
      }
      .gate-sub a { color: #008fd3; font-weight: 600; text-decoration: none; }
      .gate-err {
        display: none;
        margin-bottom: 14px;
        padding: 10px 12px;
        border-radius: 10px;
        background: #fef2f2;
        color: #b42318;
        font-size: 0.82rem;
      }
      .gate-err.show { display: block; }
      .gate-note {
        margin-top: 22px;
        padding-top: 18px;
        border-top: 1px solid #e2e9ec;
        font-size: 0.72rem;
        color: #5c6678;
        line-height: 1.5;
      }
    </style>
  </head>
  <body>
    <div class="gate-shell">
      <a class="gate-back" href="/">← Workshop hub</a>
      <div class="gate-panel">
        <div class="gate-mark">TFF</div>
        <h1>Speaker packet</h1>
        <p class="gate-sub">
          TFF team only — full talk tracks and answers for presenters.
          Workshop guests can use the <a href="/present">public slides</a> without a password.
        </p>
        <p class="gate-err" id="gate-err">Incorrect password — try again.</p>
        <form id="gate-form">
          <label class="boi-label" for="gate-pw">Team password</label>
          <input type="password" id="gate-pw" autocomplete="current-password" placeholder="Enter team password" autofocus />
          <button type="submit" class="boi-btn primary" style="width:100%;margin-top:4px">Unlock speaker packet</button>
        </form>
        <p class="gate-note">Confidential · The Flavor Factory internal use · July 8, 2026 workshop</p>
      </div>
    </div>
    <script src="/js/auth.js"></script>
    <script>
      if (TFF.isAuthed()) {
        location.replace(TFF.getReturnUrl("/packet"));
      }
      document.getElementById("gate-form").addEventListener("submit", function (e) {
        e.preventDefault();
        var pw = document.getElementById("gate-pw").value;
        var err = document.getElementById("gate-err");
        var btn = e.target.querySelector("button");
        err.classList.remove("show");
        btn.disabled = true;
        btn.textContent = "Checking…";
        TFF.login(pw).then(function (ok) {
          btn.disabled = false;
          btn.textContent = "Unlock speaker packet";
          if (ok) {
            location.replace(TFF.getReturnUrl("/packet"));
          } else {
            err.classList.add("show");
          }
        });
      });
    </script>
  </body>
</html>
