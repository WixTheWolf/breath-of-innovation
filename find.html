<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="description" content="Find anything on the Breath of Innovation workshop hub — presentation, tasting, portfolio, and team tools." />
    <meta name="theme-color" content="#ffffff" />
    <title>Find Anything · Breath of Innovation</title>
    <link rel="icon" href="/assets/favicon.svg" type="image/svg+xml" />
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;600;700&family=Sora:wght@600;700;800&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/css/directory.css" />
    <link rel="stylesheet" href="/css/brand.css" />
  </head>
  <body class="dir-page">
    <header class="dir-hero">
      <div class="dir-hero-in">
        <p class="dir-hero-kicker">The Flavor Factory × TheraBreath</p>
        <h1>Find <em>anything</em></h1>
        <p>Every page on the Breath of Innovation workshop hub — jump to a topic or search below.</p>
      </div>
    </header>

    <div class="dir-layout">
      <aside class="dir-search-col">
        <div class="dir-search" id="dir-search-wrap">
          <input type="search" id="dir-search" placeholder="Search — presentation, tasting, portfolio…" autocomplete="off" aria-label="Search" />
          <div class="dir-search-results" id="dir-search-results"></div>
        </div>
        <p class="dir-jump-label">Jump to topic</p>
        <nav class="dir-jump" id="dir-jump"></nav>
      </aside>
      <main id="dir-clusters"></main>
    </div>

    <p style="text-align:center;padding:0 24px 48px;font-size:0.8rem;color:#5c6678">
      <a href="/" style="color:#008fd3;font-weight:700">← Workshop hub</a>
    </p>

    <script src="/js/site-directory.js"></script>
    <script src="/js/directory-ui.js"></script>
    <script>
      DirectoryUI.renderJumpNav("dir-jump", { showInternal: true });
      DirectoryUI.renderClusters("dir-clusters", { showInternal: true });
      DirectoryUI.initSearch("dir-search", "dir-search-results", { showInternal: true });
    </script>
  </body>
</html>
