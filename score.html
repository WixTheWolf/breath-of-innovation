<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="description" content="Admin results dashboard for the Flavor Flight Challenge." />
    <meta name="theme-color" content="#071522" />
    <title>Flight Results Admin · Breath of Innovation</title>
    <link rel="icon" href="/assets/favicon.svg" type="image/svg+xml" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:ital,opsz,wght@0,8..60,400..700&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/css/site.css" />
    <link rel="stylesheet" href="/css/taste.css" />
    <link rel="stylesheet" href="/css/system.css" />
    <meta property="og:title" content="Breath of Innovation" />
    <meta property="og:description" content="July 8, 2026 capabilities workshop. The Flavor Factory and TheraBreath, Norco CA." />
    <meta property="og:image" content="https://breath-of-innovation.vercel.app/assets/og.png" />
    <meta property="og:type" content="website" />
    <meta name="twitter:card" content="summary_large_image" />
  </head>
  <body class="flight-admin-body sys">
    <canvas class="boi-canvas" id="boi-canvas" aria-hidden="true"></canvas>
    <nav class="boi-nav" id="boi-nav"></nav>

    <main class="flight-admin">
      <header class="flight-admin-head">
        <p class="boi-kicker"><i aria-hidden="true"></i> Admin only</p>
        <h1>Flavor Flight Results</h1>
        <p>Guest feedback by blind sample. Internal flavor key stays hidden until admin unlock.</p>
      </header>

      <section class="flight-admin-lock" id="flight-admin-lock">
        <h2>Admin access</h2>
        <p>Enter the team password to view results and the flavor key.</p>
        <form id="flight-admin-login">
          <input type="password" id="flight-admin-password" autocomplete="current-password" placeholder="Team password" />
          <button type="submit">Unlock dashboard</button>
        </form>
        <p class="flight-admin-error" id="flight-admin-error">Incorrect password. Please try again.</p>
      </section>

      <section class="flight-admin-panel" id="flight-admin-panel" hidden>
        <div class="flight-admin-actions">
          <button type="button" id="flight-refresh">Refresh</button>
          <button type="button" class="primary" id="flight-export">Export CSV</button>
          <button type="button" class="danger" id="flight-reset">Reset live results</button>
        </div>

        <div class="flight-admin-summary">
          <article><span>Responses</span><b id="flight-response-count">0</b></article>
          <article><span>Top ranked</span><b id="flight-top-ranked">-</b></article>
          <article><span>Last update</span><b id="flight-updated">-</b></article>
        </div>

        <div class="flight-admin-grid" id="flight-results"></div>

        <section class="flight-admin-key">
          <h2>Flavor key / reveal</h2>
          <div id="flight-key"></div>
        </section>
      </section>
    </main>

    <script src="/js/content.js"></script>
    <script src="/js/boi-nav.js"></script>
    <script src="/js/concepts.js"></script>
    <script src="/js/storage.js"></script>
    <script src="/js/auth.js"></script>
    <script src="/js/flight-admin.js"></script>
    <script src="/js/site.js"></script>
  </body>
</html>
